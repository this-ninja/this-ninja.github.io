<!doctype html>
<html lang="en-US">
  <head>
    {% include head.html %}
  </head>
  <body class="page-{{ page.layout | default: 'default' }}{% if page.url == '/' %} page-home{% else %} page-interior{% endif %}">
    <div class="site-atmosphere" aria-hidden="true"></div>
    <div class="site-shell">
      {% include site-header.html %}
      <main class="site-main" id="main-content">
        <div class="container">
          {{ content }}
        </div>
      </main>
      {% include site-footer.html %}
    </div>
  </body>
</html>
